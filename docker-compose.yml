services:
  mysql_java:
    image: mysql:8.0
    container_name: PrimeiroProjetoJava
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: coursejdbc
      MYSQL_USER: developer
      MYSQL_PASSWORD: 12345
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - ./coursejdbc:/var/lib/mysql
